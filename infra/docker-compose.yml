name: drishti

services:
  postgres:
    container_name: drishti-postgres
    image: postgis/postgis:16-3.4

    environment:
      POSTGRES_DB: drishti
      POSTGRES_USER: drishti
      POSTGRES_PASSWORD: drishti
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drishti -d drishti"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: drishti-redis
    image: redis:7-alpine

    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    container_name: drishti-minio
    image: minio/minio:latest

    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    container_name: drishti-api
    build:
      context: ../apps/api
      dockerfile: Dockerfile

    command: uvicorn drishti_api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+psycopg2://drishti:drishti@drishti-postgres:5432/drishti
      REDIS_URL: redis://drishti-redis:6379/0
      MINIO_ENDPOINT: drishti-minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: drishti-imagery
      SEED_TENANT_ID: "00000000-0000-0000-0000-000000000001"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../apps/api/src:/app/src
      - ../apps/api/alembic:/app/alembic
      - ../apps/api/alembic.ini:/app/alembic.ini
    restart: unless-stopped

  worker:
    container_name: drishti-worker
    build:
      context: ../apps/api
      dockerfile: Dockerfile

    command: celery -A drishti_api.workers.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg2://drishti:drishti@drishti-postgres:5432/drishti
      REDIS_URL: redis://drishti-redis:6379/0
      MINIO_ENDPOINT: drishti-minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: drishti-imagery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../apps/api/src:/app/src
    restart: unless-stopped

volumes:
  pgdata:
  minio_data:
  redis_data:
