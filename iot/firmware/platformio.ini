[env:drishti_sensor]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    bblanchon/ArduinoJson @ ^7.0.4
    knolleary/PubSubClient @ ^2.8.0
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=0
