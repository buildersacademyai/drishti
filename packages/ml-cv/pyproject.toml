[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "drishti-cv"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "earthengine-api>=0.1.400",
    "rasterio>=1.3",
    "geopandas>=0.14",
    "shapely>=2.0",
    "numpy>=1.26",
    "opencv-python-headless>=4.9",
    "Pillow>=10.0",
    "requests>=2.31",
    "jupytext>=1.16",
]

[project.optional-dependencies]
train = [
    "ultralytics>=8.2",
    "torch>=2.1",
    "torchvision>=0.16",
    "timm>=0.9",
]

[tool.hatch.build.targets.wheel]
packages = ["src/drishti_cv"]
